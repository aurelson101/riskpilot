services:
  nginx:
    volumes:
      - ./docker/nginx/production-http.conf:/etc/nginx/conf.d/default.conf:ro
  backend:
    build:
      target: production
    volumes: !override []
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
  worker:
    build:
      target: production
    volumes: !override []
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
  frontend:
    build:
      target: production
    volumes: !override []
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
  mailpit:
    profiles: [development]
