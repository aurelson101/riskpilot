name: riskpilot

x-backend: &backend
  build:
    context: ./backend
    target: development
  env_file: .env
  volumes:
    - ./backend:/app
    - backend_vendor:/app/vendor
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks: [riskpilot]

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/app/public:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks: [riskpilot]

  backend:
    <<: *backend
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(extension_loaded(\"pdo_pgsql\") && extension_loaded(\"redis\") ? 0 : 1);'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    <<: *backend
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M -vv
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [riskpilot]

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [riskpilot]

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [riskpilot]

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "8025:8025"
    networks: [riskpilot]

volumes:
  postgres_data:
  redis_data:
  backend_vendor:
  frontend_node_modules:

networks:
  riskpilot:
    driver: bridge
