name: riskpilot

x-backend: &backend
  build:
    context: ./backend
    target: development
  env_file: .env
  volumes:
    - ./backend:/app
    - backend_vendor:/app/vendor
    - isms_document_files:/app/var/isms-documents
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks: [riskpilot]

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/app/public:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks: [riskpilot]

  backend:
    <<: *backend
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 && php bin/console doctrine:query:sql 'SELECT 1' >/dev/null && php -r '$$redis = new Redis(); $$redis->connect(\"redis\", 6379, 1); exit($$redis->ping() ? 0 : 1);'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    <<: *backend
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M -vv
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php bin/console messenger:stats async >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [riskpilot]

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [riskpilot]

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [riskpilot]

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "8025:8025"
    networks: [riskpilot]

  clamav:
    image: clamav/clamav:1.4
    profiles: ["antivirus"]
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks: [riskpilot]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles: ["object-storage"]
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${DOCUMENT_S3_ACCESS_KEY:-riskpilot}
      MINIO_ROOT_PASSWORD: ${DOCUMENT_S3_SECRET_KEY:-riskpilot-change-this-secret}
      MINIO_ROOT_USER_FILE: ""
      MINIO_ROOT_PASSWORD_FILE: ""
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [riskpilot]

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    profiles: ["object-storage"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" && mc mb --ignore-existing \"local/$${DOCUMENT_S3_BUCKET}\""]
    environment:
      MINIO_ROOT_USER: ${DOCUMENT_S3_ACCESS_KEY:-riskpilot}
      MINIO_ROOT_PASSWORD: ${DOCUMENT_S3_SECRET_KEY:-riskpilot-change-this-secret}
      DOCUMENT_S3_BUCKET: ${DOCUMENT_S3_BUCKET:-riskpilot-documents}
    networks: [riskpilot]

volumes:
  postgres_data:
  redis_data:
  backend_vendor:
  frontend_node_modules:
  isms_document_files:
  clamav_data:
  minio_data:

networks:
  riskpilot:
    driver: bridge
