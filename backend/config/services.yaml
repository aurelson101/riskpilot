# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.secret: '%env(APP_SECRET)%'
    app.url: '%env(APP_URL)%'
    document_antivirus_host: ''
    document_storage_quota_bytes: '1073741824'
    document_s3_empty: ''
    document_s3_region: 'eu-west-1'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Security\SecretCipher:
        arguments:
            $appSecret: '%app.secret%'

    App\Application\IsmsDocumentStorage:
        arguments:
            $directory: '%kernel.project_dir%/var/isms-documents'
            $quotaBytes: '%env(int:default:document_storage_quota_bytes:DOCUMENT_STORAGE_QUOTA_BYTES)%'
            $s3Endpoint: '%env(default:document_s3_empty:DOCUMENT_S3_ENDPOINT)%'
            $s3Bucket: '%env(default:document_s3_empty:DOCUMENT_S3_BUCKET)%'
            $s3Region: '%env(default:document_s3_region:DOCUMENT_S3_REGION)%'
            $s3AccessKey: '%env(default:document_s3_empty:DOCUMENT_S3_ACCESS_KEY)%'
            $s3SecretKey: '%env(default:document_s3_empty:DOCUMENT_S3_SECRET_KEY)%'

    App\Application\DocumentAntivirus:
        arguments:
            $host: '%env(default:document_antivirus_host:CLAMAV_HOST)%'

    App\Controller\AuthController:
        arguments:
            $loginLimiter: '@limiter.login'
            $appUrl: '%app.url%'

    App\Controller\EmailSettingsController:
        arguments:
            $appUrl: '%app.url%'

    App\Controller\IsmsDocumentController:
        arguments:
            $appUrl: '%app.url%'

    App\Controller\CalendarController:
        arguments:
            $appUrl: '%app.url%'

    App\Controller\SessionController:
        arguments:
            $appUrl: '%app.url%'

    App\Controller\AuditLogController:
        arguments:
            $appSecret: '%app.secret%'

    App\Controller\HealthController:
        arguments:
            $redisUrl: '%env(REDIS_URL)%'

    App\Controller\PublicIsmsDocumentController:
        arguments:
            $shareLimiter: '@limiter.document_share'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
